version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: outreach
      POSTGRES_USER: outreach
      POSTGRES_PASSWORD: outreach
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outreach"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Server ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://outreach:outreach@postgres:5432/outreach
      REDIS_URL: redis://redis:6379/0
      TRACE_FILE_PATH: /app/traces/traces.jsonl
    volumes:
      - traces:/app/traces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── ARQ Worker ──────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://outreach:outreach@postgres:5432/outreach
      REDIS_URL: redis://redis:6379/0
      TRACE_FILE_PATH: /app/traces/traces.jsonl
    volumes:
      - traces:/app/traces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Streamlit Dashboard ─────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      TRACE_FILE_PATH: /app/traces/traces.jsonl
    volumes:
      - traces:/app/traces
    depends_on:
      - api

volumes:
  pgdata:
  traces:
